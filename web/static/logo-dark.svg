<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <defs>
    <linearGradient id="towerGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:currentColor"/>
      <stop offset="100%" style="stop-color:currentColor"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <rect x="0" y="0" width="80" height="80" rx="16" fill="#1E293B"/>

  <!-- Tower: vertical spine from tip to base -->
  <line x1="40" y1="28" x2="40" y2="66" stroke="url(#towerGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Tower: left diagonal leg from midpoint to base-left -->
  <line x1="40" y1="50" x2="18" y2="66" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tower: right diagonal leg from midpoint to base-right -->
  <line x1="40" y1="50" x2="62" y2="66" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Signal wave 1 - closest to tip -->
  <path d="M 29 25 C 27 19, 53 19, 51 25" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="1"/>
  <!-- Signal wave 2 - middle -->
  <path d="M 21 17 C 17 7, 63 7, 59 17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- Signal wave 3 - outer -->
  <path d="M 13 9 C 7 -4, 73 -4, 67 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Tip dot -->
  <circle cx="40" cy="28" r="3.5" fill="currentColor"/>

  <!-- Wordmark -->
  <text x="96" y="52" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="42" font-weight="900" fill="#F8FAFC" letter-spacing="-1.5">CHANNEL<tspan fill="currentColor">ARR</tspan></text>
</svg>
